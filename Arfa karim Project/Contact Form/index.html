<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nabeel Muhammad | Contact</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ==========================================
         ROOT VARIABLES
      ========================================== */
      :root {
        --bg-primary: #0a0a0a;
        --bg-secondary: #141414;
        --bg-card: #1a1a1a;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #666666;
        --gold: #c08552;
        --gold-light: #d4a574;
        --purple: #8b5cf6;
        --purple-light: #a78bfa;
        --gradient-1: linear-gradient(135deg, var(--gold), var(--purple));
        --gradient-2: linear-gradient(135deg, var(--purple), var(--gold));
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.15);
        --radius: 16px;
        --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ==========================================
         RESET & BASE
      ========================================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        overflow-x: hidden;
      }

      /* Animated Background Orbs */
      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        z-index: 0;
        animation: orbFloat 10s ease-in-out infinite alternate;
      }

      body::before {
        width: 400px;
        height: 400px;
        background: var(--gold);
        top: -100px;
        right: -100px;
      }

      body::after {
        width: 350px;
        height: 350px;
        background: var(--purple);
        bottom: -100px;
        left: -100px;
        animation-delay: 3s;
      }

      @keyframes orbFloat {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(40px, -40px) scale(1.2);
        }
      }

      /* ==========================================
         MAIN CONTAINER & CARD
      ========================================== */
      .contact-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 520px;
      }

      .contact-card {
        background: rgba(26, 26, 26, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 24px;
        padding: 40px 36px;
        box-shadow: var(--shadow), var(--shadow-glow);
        transition: all var(--transition);
        position: relative;
        overflow: hidden;
      }

      .contact-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--gradient-1);
        border-radius: 24px 24px 0 0;
      }

      .contact-card::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 24px;
        padding: 1px;
        background: var(--gradient-1);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.3;
        pointer-events: none;
      }

      /* ==========================================
         HEADER
      ========================================== */
      .contact-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 8px;
      }

      .contact-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: var(--gradient-1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        flex-shrink: 0;
      }

      .contact-title {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: var(--gradient-1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .contact-subtitle {
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 28px;
        line-height: 1.6;
        padding-left: 62px;
      }

      /* ==========================================
         FORM & FLOATING LABELS
      ========================================== */
      .contact-form {
        display: grid;
        gap: 18px;
      }

      .form-group.floating {
        position: relative;
      }

      .form-group.floating input,
      .form-group.floating textarea {
        width: 100%;
        padding: 22px 18px 8px 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1.5px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 15px;
        font-family: "Inter", sans-serif;
        transition: all var(--transition);
        outline: none;
      }

      .form-group.floating textarea {
        resize: vertical;
        min-height: 130px;
      }

      .form-group.floating label {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        color: var(--text-muted);
        pointer-events: none;
        transition: all var(--transition);
      }

      .form-group.floating textarea ~ label {
        top: 22px;
        transform: none;
      }

      .form-group.floating input:focus,
      .form-group.floating textarea:focus {
        border-color: var(--purple);
        background: rgba(139, 92, 246, 0.04);
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.08);
      }

      .form-group.floating input:focus ~ label,
      .form-group.floating input:not(:placeholder-shown) ~ label,
      .form-group.floating textarea:focus ~ label,
      .form-group.floating textarea:not(:placeholder-shown) ~ label {
        top: 8px;
        transform: translateY(0);
        font-size: 11px;
        font-weight: 600;
        color: var(--purple-light);
      }

      /* ==========================================
         SUBMIT BUTTON
      ========================================== */
      .submit-btn {
        position: relative;
        padding: 16px 32px;
        border: none;
        border-radius: 12px;
        background: var(--gradient-1);
        color: white;
        font-size: 16px;
        font-weight: 700;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        transition: all var(--transition);
        overflow: hidden;
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(139, 92, 246, 0.3);
      }

      .submit-btn.loading {
        pointer-events: none;
        opacity: 0.8;
      }

      .submit-btn.loading .btn-text,
      .submit-btn.loading .btn-icon {
        visibility: hidden;
      }

      .submit-btn .spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        position: absolute;
      }

      .submit-btn.loading .spinner {
        display: block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ==========================================
         SOCIAL LINKS
      ========================================== */
      .social-links {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .social-link {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        text-decoration: none;
        transition: all var(--transition);
      }

      .social-link:hover {
        background: var(--gradient-1);
        color: white;
        transform: translateY(-3px);
      }

      /* ==========================================
         SUCCESS TOAST
      ========================================== */
      .toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: rgba(16, 185, 129, 0.95);
        backdrop-filter: blur(12px);
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      @media (max-width: 640px) {
        .contact-card {
          padding: 28px 20px;
        }
        .contact-subtitle {
          padding-left: 0;
        }
        .contact-header {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>

    <!-- ==========================================
         JAVASCRIPT HANDLER
    ========================================== -->
    <script>
      const form = document.getElementById("contactForm");
      const submitBtn = document.getElementById("submitBtn");
      const toast = document.getElementById("toast");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        // Show loading state
        submitBtn.classList.add("loading");

        const formData = new FormData(form);

        try {
          const response = await fetch("https://api.web3forms.com/submit", {
            method: "POST",
            body: formData,
          });

          const result = await response.json();

          if (result.success) {
            // Show Success Toast
            toast.classList.add("show");
            form.reset();

            setTimeout(() => {
              toast.classList.remove("show");
            }, 5000);
          } else {
            alert("Something went wrong. Please try again.");
          }
        } catch (error) {
          alert("Error submitting form. Please check your connection.");
        } finally {
          submitBtn.classList.remove("loading");
        }
      });
    </script>
