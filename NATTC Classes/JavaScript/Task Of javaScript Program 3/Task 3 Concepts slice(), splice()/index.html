  <body>
    <script>
      // Concepts: slice(), splice()
      let movies = ["Inception", "Avatar", "Titanic", "Joker", "Interstellar"];

      let newMov = movies.slice(1, 4);
      movies.splice(3, 1);
      movies.splice(2, 1, "The Matrix");

      console.log(movies);
      console.log(newMov);

      // 4️⃣ Bus Queue Simulation

      //Concepts: unshift(), push(), shift()

      let busQueue = ["Alice", "Bob", "Charlie"];
      busQueue.push("David");
      busQueue.unshift("Emma");
      busQueue.shift();

      console.log(busQueue);
    </script>
  </body>
</html>
