  <body>
    <script>
      //Concepts: push(), splice(), pop()

      let students = ["John", "Emma", "Noah", "Liam"];

      students.push("Sophia");

      students.splice(2, 1);
      students.pop();

      console.log(students);
      
    </script>
  </body>
