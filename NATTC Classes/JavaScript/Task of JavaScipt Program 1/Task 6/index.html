<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 6</title>
  </head>
  <body>
    <script>
      //Increment / Decrement

      let count = 5;

      let a = ++count;
      alert("a : " + a + " count : " + count);
      let b = count++;
      alert("b : " + b + " count : " + count);
      let c = --count;
      alert("c : " + c + " count : " + count);
      let d = count--;
      alert("d : " + d + " count : " + count);
    </script>
  </body>
</html>
