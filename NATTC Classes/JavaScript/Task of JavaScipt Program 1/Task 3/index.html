  <body>
    <script>
      let num1;
      num1 = 60;
      let num2;
      num2 = 25;
      let sum = num1 + num2;
      let Difference = num1 - num2;
      let Product = num1 * num2;
      let Division = num1 / num2;
      let Modulus = num1 % num2;
      console.log("Sum of Both is : " + sum);
      console.log("Minus of Both is : " + Difference);
      console.log("Product of both : " + Product);
      console.log("Division of both : " + Division);
      console.log("Modulus of both : " + Modulus);
      alert("Sum of both : " + sum);
      alert("Difference of both : " + Difference);
      alert("Product of both : " + Product);
      alert("Division of both : " + Division);
      alert("Modulus of both : " + Modulus);
    </script>
