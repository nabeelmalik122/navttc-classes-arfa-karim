<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Modern Tech Vibrant Orange Gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa44;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4433;stop-opacity:1" />
    </linearGradient>
    <!-- Background Card Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark Mode Smooth Rounded Container -->
  <rect width="800" height="250" rx="40" fill="url(#cardBg)" />

  <!-- Left Side: Icon Mark (Sleek Geometric 'N') -->
  <g transform="translate(40, 25)">
    <!-- Tech Frame -->
    <rect width="200" height="200" rx="30" fill="#1e293b" stroke="url(#brandGrad)" stroke-width="3" opacity="0.4" />
    <!-- Glowing Geometric 'N' Symbol -->
    <path d="M 80 155 L 80 45" fill="none" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" />
    <path d="M 80 45 L 120 155 L 120 45" fill="none" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Decorative Tech Orbit Accent -->
    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#brandGrad)" stroke-width="2" stroke-dasharray="10 6" opacity="0.5" />
    <circle cx="100" cy="25" r="8" fill="#ffffff" />
  </g>

  <!-- Right Side: Clean Modern Typography -->
  <g transform="translate(280, 0)">
    <!-- First Name: Bold and Dominant -->
    <text x="0" y="125" 
          font-family="System-UI, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="52px" 
          font-weight="900" 
          fill="#ffffff" 
          letter-spacing="2px">
          NABEEL
    </text>
    
    <!-- Last Name: Gradient Highlight -->
    <text x="210" y="125" 
          font-family="System-UI, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="52px" 
          font-weight="900" 
          fill="url(#brandGrad)" 
          letter-spacing="2px">
          MUHAMMAD
    </text>
    
    <!-- Professional Tagline (Subtext) -->
    <text x="5" y="165" 
          font-family="System-UI, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="18px" 
          font-weight="500" 
          fill="#94a3b8" 
          letter-spacing="10px">
          DEVELOPER &amp; DESIGNER
    </text>
  </g>
</svg>
