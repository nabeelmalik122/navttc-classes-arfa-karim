<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Registration Form</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>Student Registration Form</legend>

        <!--  -->
        <label for="username">Full Name <br /></label>
        <input
          type="text"
          name="username"
          id=""
          placeholder="Enter Full Your Name..."
          required
          maxlength="10"
        />
        <br /><br />

        <!--  -->
        <label for="fName">Father Name <br /></label>
        <input
          type="text"
          name="fName"
          id=""
          placeholder="Enter Your Father Name..."
          required
          maxlength="10"
        />
        <br /><br />
        <!--  -->
        <label for="email">Email <br /></label>
        <input
          type="email"
          name="email"
          id=""
          required
          placeholder="Enter Your Email..."
          maxlength="30"
        /><br /><br />

        <!--  -->
        <label for="phone">Phone Number <br /></label>
        <input
          type="tel"
          name="phone"
          id=""
          required
          placeholder="+92"
          maxlength="11"
        />
        <br /><br />

        <!--  -->
        <label for="dob">Date of Birth <br /></label>
        <input type="date" name="dob" id="" required />
        <br /><br />

        <!--  -->
        <label for="age">Age <br /></label>
        <input
          type="number"
          name="age"
          id=""
          placeholder="Enter Your Age"
          required
          min="15"
          max="70"
        /><br /><br />

        <!--  -->
        <label for="">Gender <br /></label>
        <input type="radio" name="gender" id="" value="male" required /> Male
        <input type="radio" name="gender" id="" value="Female" required />
        Female
        <input type="radio" name="gender" id="" value="Other" required /> Other
        <br /><br />

        <!--  -->
        <label for="city">City</label>
        <select name="city" id="" required>
          <option value="" disabled selected>-- Select Your City --</option>
          <option value="Peshawar">Peshawar</option>
          <option value="Pabbi">Pabbi</option>
          <option value="Nowshera">Nowshera</option>
          <option value="Islam Abad">Islam Abad</option>
          <option value="Karachi">Karachi</option>
        </select>
        <br /><br />

        <!--  -->
        <label for="skill">Skill <br /></label>
        <input type="checkbox" name="HTML" id="" required value="HTML" />HTML
        <input type="checkbox" name="CSS" id="" required value="CSS" />CSS
        <input
          type="checkbox"
          name="JavaScript"
          id=""
          required
          value="JavaScript"
        />JavaScript
        <input type="checkbox" name="React" id="" required value="React" />React
        <br /><br />

        <!--  -->
        <label for="cv">Upload Your Photo<br /></label>
        <input type="file" name="Photo" id="" readonly accept=".png, .gif " />
        <br /><br />

        <!--  -->
        <label for="address"> Your Address <br /></label>
        <textarea
          id=""
          name="address"
          placeholder="Enter your complete address.."
          cols="40"
          rows="5"
        ></textarea>
        <br /><br />

        <!--  -->
        <label for="new-password">Password <br /></label>
        <input
          type="password"
          name="new-password"
          id=""
          required
          maxlength="10"
          pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
          title="Must contain at least one  number and one uppercase and lowercase letter, and at least 8 or more characters"
          placeholder="Create a Password"
        />
        <br />
        <br />
        <label for="confirm-password">Confirm Password <br /></label>
        <input
          type="password"
          name="confirm-password"
          id=""
          required
          placeholder="Enter Your Confirm Password"
        />
        <br /><br />

        <!--  -->
        <label for="course"> Select Your Course <br /></label>
        <select name="course" id="">
          <option value="" disabled selected>-- Select Your Course --</option>
          <option value="web Development">Web Development</option>
          <option value="Graphic Design">Graphic Design</option>
          <option value="Artificial Intelligence">
            Artificial Intelligence
          </option>
          <option value="Digital Marketing">Digital Marketing</option>
          <option value="Mobile App Development">Mobile AppDevelopment</option>
        </select>
        <br /><br />
      </fieldset>

      <fieldset>
        <legend>Terms and Conditions</legend>
        <input type="checkbox" name="terms" required />
        <label for="terms">I agree to the Terms and Conditions</label>
        <br /><br />

        <!--  -->
        <input type="submit" id="" value="submit" />
        <input type="reset" id="" value="reset" />
      </fieldset>
    </form>
  </body>
</html>
